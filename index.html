<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #f5f4f0;
–surface: #ffffff;
–border: #dddbd6;
–text: #1a1a1e;
–muted: #8a8890;
–line: #d0ceca;
}

@media (prefers-color-scheme: dark) {
:root {
–bg: #0d0d0f;
–surface: #161619;
–border: #2a2a30;
–text: #e8e6e0;
–muted: #6b6870;
–line: #2e2e36;
}
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
height: 100vh;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* Header */
header {
padding: 20px 32px 16px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
background: var(–bg);
z-index: 10;
}

header h1 {
font-family: ‘DM Serif Display’, serif;
font-size: 1.6rem;
letter-spacing: -0.02em;
color: var(–text);
}

header h1 span {
font-style: italic;
color: var(–muted);
}

.header-right {
display: flex;
align-items: center;
gap: 12px;
}

/* Filter pills */
.filters {
display: flex;
gap: 6px;
flex-wrap: wrap;
align-items: center;
padding: 12px 32px;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}

.filter-label {
font-size: 0.65rem;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(–muted);
margin-right: 4px;
}

.pill {
padding: 4px 12px;
border-radius: 100px;
font-size: 0.7rem;
font-family: ‘DM Mono’, monospace;
border: 1px solid transparent;
cursor: pointer;
transition: all 0.15s;
background: transparent;
color: var(–muted);
border-color: var(–border);
}

.pill:hover { color: var(–text); border-color: #555; }
.pill.active { color: #0d0d0f; font-weight: 500; }

/* Timeline scroll area */
.timeline-wrap {
flex: 1;
overflow-x: auto;
overflow-y: hidden;
padding: 0 48px;
display: flex;
align-items: center;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
cursor: grab;
}
.timeline-wrap:active { cursor: grabbing; }
.timeline-wrap::-webkit-scrollbar { height: 4px; }
.timeline-wrap::-webkit-scrollbar-track { background: transparent; }
.timeline-wrap::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.timeline {
display: flex;
align-items: center;
min-width: max-content;
position: relative;
padding: 80px 40px;
}

/* Central line */
.timeline::before {
content: ‘’;
position: absolute;
top: 50%;
left: 0;
right: 0;
height: 1px;
background: var(–line);
transform: translateY(-0.5px);
}

/* Empty state */
.empty-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
color: var(–muted);
width: 100%;
min-height: 200px;
font-size: 0.8rem;
text-align: center;
}

.empty-state svg { opacity: 0.3; }
.empty-state p { opacity: 0.6; }

/* Event card */
.event {
display: flex;
flex-direction: column;
align-items: center;
position: relative;
margin: 0 28px;
cursor: pointer;
animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

.event.above .card { order: -1; margin-bottom: 16px; }
.event.below .card { margin-top: 16px; }

.event.above .connector { order: 0; }
.event.below .connector { order: -1; }

.connector {
width: 1px;
height: 40px;
background: var(–border);
position: relative;
}

.dot {
width: 10px;
height: 10px;
border-radius: 50%;
border: 2px solid var(–bg);
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
transition: transform 0.2s;
}

.event:hover .dot { transform: translate(-50%, -50%) scale(1.4); }

.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 14px 16px;
width: 180px;
transition: border-color 0.2s, transform 0.2s;
position: relative;
overflow: hidden;
}

.card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.event:hover .card {
border-color: #444;
transform: translateY(-2px);
}

.card-date {
font-size: 0.62rem;
color: var(–muted);
margin-bottom: 6px;
letter-spacing: 0.05em;
}

.card-title {
font-size: 0.82rem;
font-weight: 500;
color: var(–text);
line-height: 1.3;
margin-bottom: 6px;
}

.card-category {
font-size: 0.6rem;
text-transform: uppercase;
letter-spacing: 0.1em;
opacity: 0.7;
}

.card-desc {
font-size: 0.7rem;
color: var(–muted);
margin-top: 6px;
line-height: 1.4;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.card-actions {
display: flex;
gap: 6px;
margin-top: 10px;
opacity: 0;
transition: opacity 0.15s;
}

.event:hover .card-actions { opacity: 1; }

.card-btn {
flex: 1;
padding: 4px;
font-size: 0.62rem;
font-family: ‘DM Mono’, monospace;
border: 1px solid var(–border);
border-radius: 4px;
background: transparent;
color: var(–muted);
cursor: pointer;
transition: all 0.15s;
text-align: center;
}
.card-btn:hover { color: var(–text); border-color: #555; }
.card-btn.delete:hover { color: #e86a8a; border-color: #e86a8a44; }

/* Add button */
.add-btn {
display: flex;
align-items: center;
gap: 8px;
padding: 10px 20px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
cursor: pointer;
transition: all 0.15s;
}
.add-btn:hover { border-color: #555; background: #1e1e22; }
.add-btn svg { color: var(–muted); }

/* Modal */
.overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
display: flex;
align-items: center;
justify-content: center;
z-index: 100;
backdrop-filter: blur(4px);
opacity: 0;
pointer-events: none;
transition: opacity 0.2s;
}

.overlay.open {
opacity: 1;
pointer-events: all;
}

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 28px;
width: 520px;
max-width: 95vw;
max-height: 90vh;
overflow-y: auto;
transform: translateY(10px);
transition: transform 0.2s;
}

.overlay.open .modal { transform: translateY(0); }

.modal h2 {
font-family: ‘DM Serif Display’, serif;
font-size: 1.3rem;
margin-bottom: 20px;
color: var(–text);
}

.field {
margin-bottom: 16px;
}

label {
display: block;
font-size: 0.65rem;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(–muted);
margin-bottom: 6px;
}

input, textarea, select {
width: 100%;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.82rem;
padding: 10px 12px;
transition: border-color 0.15s;
outline: none;
}

input:focus, textarea:focus, select:focus {
border-color: #555;
}

textarea { resize: vertical; min-height: 70px; }
select option { background: var(–surface); }

.color-row {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.color-swatch {
width: 24px;
height: 24px;
border-radius: 50%;
border: 2px solid transparent;
cursor: pointer;
transition: transform 0.15s;
}
.color-swatch:hover { transform: scale(1.2); }
.color-swatch.selected { border-color: white; }

.modal-actions {
display: flex;
gap: 10px;
margin-top: 24px;
justify-content: flex-end;
}

.btn-secondary, .btn-primary {
padding: 9px 20px;
border-radius: 6px;
font-family: ‘DM Mono’, monospace;
font-size: 0.78rem;
cursor: pointer;
transition: all 0.15s;
border: 1px solid var(–border);
}

.btn-secondary { background: transparent; color: var(–muted); }
.btn-secondary:hover { color: var(–text); }

.btn-primary { background: var(–text); color: var(–bg); border-color: var(–text); font-weight: 500; }
.btn-primary:hover { opacity: 0.85; }

.hidden { display: none !important; }
</style>

</head>
<body>

<header>
  <h1>my <span>timeline</span></h1>
  <div class="header-right">
    <button class="add-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Event
    </button>
  </div>
</header>

<div class="filters" id="filters">
  <span class="filter-label">filter</span>
  <button class="pill active" data-cat="all" onclick="setFilter('all', this)">All</button>
</div>

<div class="timeline-wrap" id="timelineWrap">
  <div class="timeline" id="timeline">
    <div class="empty-state" id="emptyState">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>No events yet.<br>Click <strong>Add Event</strong> to get started.</p>
    </div>
  </div>
</div>

<!-- Modal -->

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">New Event</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
      <div class="field" style="grid-column:1/2">
        <label>Year *</label>
        <input type="number" id="inputYear" placeholder="e.g. 44">
      </div>
      <div class="field" style="grid-column:2/3;display:flex;flex-direction:column;justify-content:flex-end">
        <label style="visibility:hidden">Era</label>
        <select id="inputEra">
          <option value="AD">AD</option>
          <option value="BC">BC</option>
        </select>
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Event *</label>
        <input type="text" id="inputTitle" placeholder="Event name">
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Event Details</label>
        <textarea id="inputDesc" placeholder="Optional description..."></textarea>
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Historical Civilisation / Country</label>
        <input type="text" id="inputCivilisation" placeholder="e.g. Roman Empire">
      </div>
      <div class="field">
        <label>Modern State / Region</label>
        <input type="text" id="inputRegion" placeholder="e.g. Tuscany">
      </div>
      <div class="field">
        <label>Modern Country</label>
        <input type="text" id="inputCountry" placeholder="e.g. Italy">
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Category *</label>
        <input type="text" id="inputCategory" placeholder="e.g. Military, Cultural, Political...">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<script>
  const PALETTE = [
    '#e87c5a','#6ab5e8','#a8d96b','#d4a3e8',
    '#f0d06a','#e86a8a','#6ae8c8','#e8b46a',
    '#7eb8f7','#f7a07e','#b8e86a','#e86af0',
  ];
  const catColorMap = {};
  let colorIndex = 0;

  function catColor(name) {
    const key = name.trim().toLowerCase();
    if (!key) return '#888';
    if (!catColorMap[key]) {
      catColorMap[key] = PALETTE[colorIndex % PALETTE.length];
      colorIndex++;
    }
    return catColorMap[key];
  }

  // Pre-seed colours from existing saved events so colours stay consistent on reload
  function seedColors() {
    const cats = [...new Set(events.map(e => (e.category || '').trim().toLowerCase()))].filter(Boolean);
    cats.forEach(k => { if (!catColorMap[k]) { catColorMap[k] = PALETTE[colorIndex % PALETTE.length]; colorIndex++; } });
  }

  let events = JSON.parse(localStorage.getItem('tl_events') || '[]');
  let editId = null;
  let activeFilter = 'all';

  function save() {
    localStorage.setItem('tl_events', JSON.stringify(events));
  }

  function render() {
    const timeline = document.getElementById('timeline');
    const empty = document.getElementById('emptyState');

    // Filter
    let visible = activeFilter === 'all' ? events : events.filter(e => e.category === activeFilter);
    // Sort by year (BC goes negative)
    visible = [...visible].sort((a, b) => toSortYear(a) - toSortYear(b));

    // Remove existing event nodes
    timeline.querySelectorAll('.event').forEach(n => n.remove());

    if (visible.length === 0) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    visible.forEach((ev, i) => {
      const above = i % 2 === 0;
      const color = catColor(ev.category);
      const el = document.createElement('div');
      el.className = `event ${above ? 'above' : 'below'}`;
      el.innerHTML = `
        <div class="card" style="--accent:${color}">
          <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${color};border-radius:8px 8px 0 0"></div>
          <div class="card-date">${esc(ev.era === 'BC' ? ev.year + ' BC' : 'AD ' + ev.year)}</div>
          <div class="card-title">${esc(ev.title)}</div>
          <div class="card-category" style="color:${color}">${esc(ev.category)}</div>
          ${ev.civilisation ? `<div class="card-desc" style="margin-top:4px;color:#888">${esc(ev.civilisation)}</div>` : ''}
          ${ev.desc ? `<div class="card-desc">${esc(ev.desc)}</div>` : ''}
          <div class="card-actions">
            <button class="card-btn" onclick="editEvent('${ev.id}')">edit</button>
            <button class="card-btn delete" onclick="deleteEvent('${ev.id}')">delete</button>
          </div>
        </div>
        <div class="connector">
          <div class="dot" style="background:${color}"></div>
        </div>
      `;
      timeline.appendChild(el);
    });

    renderFilters();
  }

  function renderFilters() {
    const used = [...new Set(events.map(e => e.category))].sort();
    const bar = document.getElementById('filters');
    bar.querySelectorAll('.pill:not([data-cat="all"])').forEach(p => p.remove());

    used.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'pill' + (activeFilter === cat ? ' active' : '');
      btn.dataset.cat = cat;
      const color = catColor(cat);
      btn.textContent = cat;
      if (activeFilter === cat) {
        btn.style.background = color;
        btn.style.borderColor = color;
      } else {
        btn.style.borderColor = color + '55';
        btn.style.color = color;
      }
      btn.onclick = () => setFilter(cat, btn);
      bar.appendChild(btn);
    });

    // Update "All" pill
    const allPill = bar.querySelector('[data-cat="all"]');
    if (activeFilter === 'all') {
      allPill.classList.add('active');
      allPill.style.background = '#e8e6e0';
      allPill.style.borderColor = '#e8e6e0';
      allPill.style.color = '#0d0d0f';
    } else {
      allPill.classList.remove('active');
      allPill.style.background = '';
      allPill.style.borderColor = '';
      allPill.style.color = '';
    }
  }

  function setFilter(cat, btn) {
    activeFilter = cat;
    render();
  }

  function toSortYear(ev) {
    const y = parseInt(ev.year) || 0;
    return ev.era === 'BC' ? -y : y;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Modal
  function openModal(id = null) {
    editId = id;
    const overlay = document.getElementById('overlay');
    document.getElementById('modalTitle').textContent = id ? 'Edit Event' : 'New Event';

    if (id) {
      const ev = events.find(e => e.id === id);
      document.getElementById('inputYear').value = ev.year || '';
      document.getElementById('inputEra').value = ev.era || 'AD';
      document.getElementById('inputTitle').value = ev.title || '';
      document.getElementById('inputDesc').value = ev.desc || '';
      document.getElementById('inputCivilisation').value = ev.civilisation || '';
      document.getElementById('inputRegion').value = ev.region || '';
      document.getElementById('inputCountry').value = ev.country || '';
      document.getElementById('inputCategory').value = ev.category || '';
    } else {
      document.getElementById('inputYear').value = '';
      document.getElementById('inputEra').value = 'AD';
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputDesc').value = '';
      document.getElementById('inputCivilisation').value = '';
      document.getElementById('inputRegion').value = '';
      document.getElementById('inputCountry').value = '';
      document.getElementById('inputCategory').value = '';
    }

    overlay.classList.add('open');
    document.getElementById('inputYear').focus();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function saveEvent() {
    const year = document.getElementById('inputYear').value.trim();
    const era = document.getElementById('inputEra').value;
    const title = document.getElementById('inputTitle').value.trim();
    const desc = document.getElementById('inputDesc').value.trim();
    const civilisation = document.getElementById('inputCivilisation').value.trim();
    const region = document.getElementById('inputRegion').value.trim();
    const country = document.getElementById('inputCountry').value.trim();
    const category = document.getElementById('inputCategory').value;

    document.getElementById('inputYear').style.borderColor = year ? '' : '#e86a8a';
    document.getElementById('inputTitle').style.borderColor = title ? '' : '#e86a8a';
    document.getElementById('inputCategory').style.borderColor = category ? '' : '#e86a8a';
    if (!year || !title || !category) return;

    if (editId) {
      const idx = events.findIndex(e => e.id === editId);
      events[idx] = { ...events[idx], year, era, title, desc, civilisation, region, country, category };
    } else {
      events.push({ id: Date.now().toString(36), year, era, title, desc, civilisation, region, country, category });
    }

    save();
    closeModal();
    render();
  }

  function editEvent(id) {
    event.stopPropagation();
    openModal(id);
  }

  function deleteEvent(id) {
    event.stopPropagation();
    events = events.filter(e => e.id !== id);
    save();
    render();
  }

  // Drag to scroll
  const wrap = document.getElementById('timelineWrap');
  let isDown = false, startX, scrollLeft;
  wrap.addEventListener('mousedown', e => {
    isDown = true; startX = e.pageX - wrap.offsetLeft; scrollLeft = wrap.scrollLeft;
  });
  wrap.addEventListener('mouseleave', () => isDown = false);
  wrap.addEventListener('mouseup', () => isDown = false);
  wrap.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - wrap.offsetLeft;
    wrap.scrollLeft = scrollLeft - (x - startX) * 1.2;
  });

  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
    if (e.key === 'Escape') closeModal();
  });

  seedColors();
  render();
</script>

</body>
</html>
